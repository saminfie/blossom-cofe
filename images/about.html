<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Cofe</title>
    <link rel="stylesheet" href="css/about.css">
</head>
<body dir="rtl">
    <section id="about" class="about">
        <p>
            کافه بلوسم یک فضای دنج و آرام برای لحظه های شیرین شماست. <br> اینجا جایی است که هر فنجان قهوه با دقت و عشق آماده میشود. چه برای استراحت، چه برای دیدار دوستان یا مطالعه، همیشه در کنار شما هستیم.
        </p>
    </section>
    <section class="gallery-wrapper">
        <button class="arrow left">&#10094;</button>
        <div class="gallery">
            <img src="images/about 1.jpg" alt="">
            <img src="images/about 2.jpg" alt="">
            <img src="images/about 3.jpg" alt="">
            <img src="images/about 4.jpg" alt="">
            <img src="images/about 5.jpg" alt="">
            <img src="images/about 6.jpg" alt="">
            <img src="images/about 7.jpg" alt="">
            <img src="images/about 8.jpg" alt="">
        </div>
        <button class="arrow right">&#10095;</button>
    </section>
    <script>
        const gallery = document.querySelector(".gallery");
        document.querySelector(".right").onclick = () => {gallery.scrollBy({left:220,behavior:"smooth"});
    };
        document.querySelector(".left").onclick = ()=> {gallery.scrollBy({left:-220,behavior:"smooth"});
    };
    </script>
</body>
</html>
